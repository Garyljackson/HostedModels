# LiteLLM gateway config — PoC (Phase 1: GPT-class + Qwen3-Coder-Next; no Claude).
# Mount this at /app/config.yaml (or bake into a custom image) and start LiteLLM with
#   litellm --config /app/config.yaml
# See infra/README.md for how to supply it to the Container App.

model_list:
  # --- GPT-class via Azure OpenAI (Foundry) ---
  - model_name: gpt-class
    litellm_params:
      model: azure/gpt-class                 # matches the AOAI deployment name
      api_base: https://<ai-services-name>.openai.azure.com
      api_key: os.environ/AZURE_API_KEY
      api_version: "2024-10-21"              # confirm current

  # --- Qwen3-Coder-Next (open-weight, Apache-2.0) via Foundry ---
  # TODO: set the real endpoint/key once the serverless deployment exists.
  - model_name: qwen3-coder
    litellm_params:
      model: azure_ai/<qwen3-coder-next-deployment>
      api_base: https://<ai-services-name>.services.ai.azure.com/models
      api_key: os.environ/AZURE_AI_API_KEY

  # === Phase 2 (deferred): Claude, Hosted on Azure (in-tenant) ===
  # Requires Azure Marketplace/CCU subscription. Uncomment when Claude is added.
  # - model_name: claude-opus-4-8
  #   litellm_params:
  #     model: azure_ai/claude-opus-4-8
  #     api_base: https://<ai-services-name>.services.ai.azure.com/anthropic
  #     api_key: os.environ/AZURE_API_KEY
  # - model_name: claude-fast
  #   litellm_params:
  #     model: azure_ai/claude-haiku-4-5
  #     api_base: https://<ai-services-name>.services.ai.azure.com/anthropic
  #     api_key: os.environ/AZURE_API_KEY
  # - model_name: claude-sonnet-5
  #   litellm_params:
  #     model: azure_ai/claude-sonnet-5
  #     api_base: https://<ai-services-name>.services.ai.azure.com/anthropic
  #     api_key: os.environ/AZURE_API_KEY

litellm_settings:
  drop_params: true
  # Metadata-only logging: DO NOT log prompt/response content.
  turn_off_message_logging: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  # Budgets/keys/spend are stored in Postgres and managed via the admin API/UI.
  # Default per-key budget is set at key-creation time (see onboarding README).

# Governance note: metadata (tokens, model, key, cost, timestamp) is retained;
# prompt/completion CONTENT is not. Verify no content sink during the eval.
