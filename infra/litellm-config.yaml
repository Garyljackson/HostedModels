# LiteLLM gateway config — PoC (Australia East, GPT-only).
# Mount at /app/config.yaml (or bake into a custom image) and start LiteLLM with
#   litellm --config /app/config.yaml
# See infra/README.md for how to supply it to the Container App.
#
# Region reality: Australia East is the only AU region with Foundry models, and
# only GPT (Azure OpenAI) is deployable there on this subscription. Open-weight
# (Qwen) and Claude are NOT deployable in AU — see the deferred blocks below.

model_list:
  # --- GPT-class via Azure OpenAI (Foundry, Australia East) ---
  - model_name: gpt-5.4                       # what developers put in their tool's `model` field
    litellm_params:
      model: azure/gpt-5-4                    # Azure deployment name (dots not allowed in deployment names)
      api_base: os.environ/AZURE_API_BASE    # injected from the AI Services endpoint
      api_version: "2024-10-21"              # confirm current
      # No api_key — keyless auth via managed identity (see litellm_settings below)
    model_info:
      # gpt-5.4 is too new for LiteLLM's built-in map; tell it the family so it maps
      # max_tokens -> max_completion_tokens (GPT-5 rejects max_tokens) and tracks cost.
      base_model: azure/gpt-5

  # --- Open-weight (Qwen) — DEFERRED (not deployable in Australia East) ---
  # qwen3-32b: deploy layer rejects GlobalStandard + no base inference quota.
  # Qwen3-Coder-Next: Marketplace/serverless, not in AU catalog.
  # To enable: resolve quota/SKU (support case), flip Bicep deployQwen=true, uncomment:
  # - model_name: qwen3-32b
  #   litellm_params:
  #     model: azure_ai/qwen3-32b
  #     api_base: https://<ai-services-name>.services.ai.azure.com/models
  #     api_key: os.environ/AZURE_AI_API_KEY

  # === Phase 2 (deferred): Claude — NOT available in Australia ===
  # In-tenant Claude is East US 2 / Sweden Central only; using it means leaving
  # AU data residency. Residency-vs-Claude is a Phase-2 decision. Example:
  # - model_name: claude-opus-4-8
  #   litellm_params:
  #     model: azure_ai/claude-opus-4-8
  #     api_base: https://<ai-services-name>.services.ai.azure.com/anthropic
  #     api_key: os.environ/AZURE_API_KEY

litellm_settings:
  drop_params: true
  # Metadata-only logging: DO NOT log prompt/response content.
  turn_off_message_logging: true
  # Keyless auth to Azure OpenAI via the container's user-assigned managed identity
  # (DefaultAzureCredential; AZURE_CLIENT_ID is injected by the Container App to
  # select the user-assigned identity). Token scope: cognitiveservices.azure.com/.default.
  enable_azure_ad_token_refresh: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  # Budgets/keys/spend live in Postgres, managed via the admin API/UI.

# Governance note: metadata (tokens, model, key, cost, timestamp) is retained;
# prompt/completion CONTENT is not. Verify no content sink during the eval.
